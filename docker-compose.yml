name: hiwm-interaction-engine

services:
  coturn:
    image: coturn/coturn
    container_name: coturn-server
    command: >
      --log-file=stdout
    environment:
      - DETECT_EXTERNAL_IP=yes
      - DETECT_RELAY_IP=yes
    volumes:
      - ./coturn-data/turnserver.conf:/etc/coturn/turnserver.conf
      - ./ssl_certs/localhost.crt:/etc/turn_cert.pem
      - ./ssl_certs/localhost.crt:/etc/turn_key.pem
    network_mode: host
    restart: unless-stopped

  hiwm-interaction-engine:
    image: hiwm-interaction-engine:latest
    container_name: hiwm-interaction-engine
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility,video
      # - UV_INDEX_URL=https://mirrors.aliyun.com/pypi/simple/
    command: >
      --config=/root/hiwm-interaction-engine/config/chat_with_hiwm_zeabur.yaml
    volumes:
      - ./build:/root/hiwm-interaction-engine/build
      - ./models:/root/hiwm-interaction-engine/models
      - ./ssl_certs:/root/hiwm-interaction-engine/ssl_certs
      - ./config:/root/hiwm-interaction-engine/config
      - ./.env:/root/hiwm-interaction-engine/.env
      - ./models/musetalk/s3fd-619a316812/:/root/.cache/torch/hub/checkpoints/
      - ./exp:/root/hiwm-interaction-engine/exp
      - ./resource:/root/hiwm-interaction-engine/resource
    ports:
      - "8080:8080"
    networks:
      - nat_network
    shm_size: "2gb"
    stdin_open: true
    tty: true
    restart: unless-stopped
    depends_on:
      - coturn
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [ gpu ]

networks:
  nat_network:
    driver: bridge
