version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly

  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: monthly
    groups:
      frontend-minor-patch:
        update-types:
          - minor
          - patch

  - package-ecosystem: npm
    directory: /docs
    schedule:
      interval: monthly
    groups:
      docs-minor-patch:
        update-types:
          - minor
          - patch
